<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>AC369 FUSION Search</title>
  <style>
    body { background: #0a0a1a; color: #e0e0ff; font-family: system-ui, sans-serif; padding: 20px; }
    input { flex: 1; padding: 12px; border-radius: 30px; border: 1px solid #4a4a8a; background: #12122a; color: white; font-size: 1rem; min-width: 150px; }
    button { padding: 12px 24px; background: #4a4aff; color: white; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; }
    .search-box { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .card { background: #12122a; border-radius: 16px; padding: 16px; border: 1px solid #2a2a4a; }
    .signal-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #1a1a3a; }
    .loading { color: #888; }
    .error { color: #ff4444; }
  </style>
</head>
<body>
  <h1>🧠 AC369 FUSION Search</h1>
  <div class="search-box">
    <input type="text" id="symbol" placeholder="Ketik simbol (BTC, ADA, SOL)...">
    <button onclick="cari()">🔬 Analisis</button>
  </div>
  <div id="result"></div>

  <script>
    async function cari() {
      var s = document.getElementById('symbol').value.trim().toUpperCase();
      var r = document.getElementById('result');
      if (!s) { r.innerHTML = '<div class="error">Masukkan simbol koin.</div>'; return; }
      r.innerHTML = '<div class="loading">Menganalisis ' + s + '...</div>';
      try {
        var res = await fetch('/api/search?symbol=' + encodeURIComponent(s));
        var d = await res.json();
        if (d.error) { r.innerHTML = '<div class="error">' + d.error + '</div>'; return; }
        
        var tf = '';
        if (d.timeframes) {
          ['1H','4H','1D'].forEach(function(t) {
            var f = d.timeframes[t] || {};
            var p = '';
            (f.patterns||[]).forEach(function(x) {
              p += '<span style="color:'+(x.signal==='bullish'?'#00ff88':x.signal==='bearish'?'#ff4444':'#ccc')+';display:inline-block;margin:2px 3px;padding:2px 6px;background:#1a1a3a;border-radius:8px;">'+x.name+'</span>';
            });
            tf += '<div style="background:#0d0d22;border-radius:10px;padding:10px;margin:8px 0;border-left:3px solid #4a4aff;">'+
              '<b>Timeframe '+t+'</b>'+
              '<div class="signal-row"><span>RSI:</span> '+(f.rsi||'N/A')+'</div>'+
              '<div><b>Pola:</b> '+(p||'-')+'</div>'+
              '<div><b>Elliott:</b> '+((f.elliottWave||{}).wave||'N/A')+' ('+((f.elliottWave||{}).confidence||0)+'%)<br><small>'+((f.elliottWave||{}).description||'')+'</small></div>'+
              '<div><b>SMC:</b> <span style="color:'+((f.smc||{}).signal==='Bullish'?'#00ff88':(f.smc||{}).signal==='Bearish'?'#ff4444':'#ccc')+';">'+((f.smc||{}).signal||'Neutral')+'</span><br><small>'+((f.smc||{}).summary||'')+'</small></div>'+
              '</div>';
          });
        }
        var rec = d.recommendation || {};
        var c = (rec.action||'').includes('LONG')?'#00ff88':(rec.action||'').includes('SHORT')?'#ff4444':'#ffaa00';
        var bg = (rec.action||'').includes('LONG')?'#1a2a1a':(rec.action||'').includes('SHORT')?'#2a1a1a':'#1a1a2a';
        var a = d.astrology || {};
        r.innerHTML = '<div class="card" style="border:2px solid #4a4aff;">'+
          '<h3>'+d.symbol+' — '+(d.name||'')+'</h3>'+
          '<div class="signal-row"><span><b>Harga:</b></span> <strong>$'+(d.price||0).toLocaleString()+'</strong></div>'+
          '<div class="signal-row"><span><b>24h:</b></span> <span style="color:'+((d.change24h||0)>=0?'#00ff88':'#ff4444')+';">'+(d.change24h||0).toFixed(2)+'%</span></div>'+
          '<div class="signal-row"><span><b>Support:</b></span> $'+(d.support||'—')+'</div>'+
          '<div class="signal-row"><span><b>Resistance:</b></span> $'+(d.resistance||'—')+'</div>'+
          '<div style="margin-top:15px;padding:14px;background:'+bg+';border-radius:12px;text-align:center;">'+
            '<b style="font-size:1.3rem;color:'+c+';">'+ (rec.action||'HOLD') +' ('+ (rec.confidence||'Netral') +')</b>'+
            '<div style="margin-top:6px;">'+ (rec.summary||rec.explanation||'') +'</div>'+
          '</div>'+
          '<div style="margin-top:15px;">'+tf+'</div>'+
          '<div style="margin-top:12px;padding:10px;background:#1a1a2a;border-radius:8px;"><b>Astrologi:</b> '+(a.signal||'N/A')+' ('+(a.moonPhase||'')+' '+(a.illumination||'')+'%)<br><small>'+(a.interpretation||'')+'</small></div>'+
          '</div>';
      } catch(e) {
        r.innerHTML = '<div class="error">ERROR: ' + e.message + '</div>';
      }
    }
  </script>
</body>
</html>
