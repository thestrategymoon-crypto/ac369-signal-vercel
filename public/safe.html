<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>AC369 FUSION Safe</title>
  
  <!-- BENTENG PERTAHANAN MAKSIMAL -->
  <script>
    (function() {
      // 1. Hapus Service Worker yang tersisa
      if (navigator.serviceWorker) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      }

      // 2. Definisikan MercuryShadow sebagai objek kosong yang tidak bisa diubah
      Object.defineProperty(window, 'MercuryShadow', {
        value: Object.freeze({ init: function() {} }),
        writable: false,
        configurable: false,
        enumerable: false
      });

      // 3. Tangkap dan telan SEMUA error yang mengandung 'MercuryShadow'
      window.addEventListener('error', function(e) {
        if (e.message && e.message.indexOf('MercuryShadow') > -1) {
          e.stopImmediatePropagation();
          e.preventDefault();
          return false;
        }
      }, true);
    })();
  </script>
  
  <style>
    body {
      background: #0a0a1a;
      color: #e0e0ff;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 20px;
      line-height: 1.5;
    }
    h1 { color: #a0a0ff; }
    .search-box { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
    input {
      flex: 1; padding: 12px 16px; border-radius: 30px;
      border: 1px solid #4a4a8a; background: #12122a; color: white; font-size: 1rem; min-width: 150px;
    }
    button {
      padding: 12px 24px; background: #4a4aff; color: white;
      border: none; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1rem;
    }
    .card {
      background: #12122a; border-radius: 16px; padding: 16px;
      border: 1px solid #2a2a4a; margin-top: 12px;
    }
    .signal-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #1a1a3a; }
    .loading { color: #888; }
    .error { color: #ff4444; }
  </style>
</head>
<body>
  <h1>🧠 AC369 FUSION — Analisis Koin</h1>
  <p>Cari koin apa pun untuk analisis super detail (1H, 4H, 1D)</p>
  
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Ketik simbol (BTC, ADA, SOL)...">
    <button onclick="window._ac369Search()">🔬 Analisis Sekarang</button>
  </div>
  
  <div id="search-result"></div>

  <script>
    (function() {
      // Fungsi search benar-benar dienkapsulasi dalam closure
      window._ac369Search = async function() {
        var input = document.getElementById('search-input');
        var resultDiv = document.getElementById('search-result');
        var symbol = input.value.trim().toUpperCase();
        
        if (!symbol) {
          resultDiv.innerHTML = '<div class="error">Masukkan simbol koin.</div>';
          return;
        }
        
        resultDiv.innerHTML = '<div class="loading">🔬 Menganalisis ' + symbol + '...</div>';
        
        try {
          var res = await fetch('/api/search?symbol=' + encodeURIComponent(symbol));
          var data = await res.json();
          
          if (data.error) {
            resultDiv.innerHTML = '<div class="error">' + data.error + '</div>';
            return;
          }
          
          var tfHtml = '';
          if (data.timeframes) {
            ['1H','4H','1D'].forEach(function(tf) {
              var d = data.timeframes[tf] || {};
              var patHtml = '';
              (d.patterns||[]).forEach(function(p) {
                var color = p.signal === 'bullish' ? '#00ff88' : (p.signal === 'bearish' ? '#ff4444' : '#ccc');
                patHtml += '<span style="color:' + color + '; display:inline-block; margin:2px 3px; padding:2px 6px; background:#1a1a3a; border-radius:8px;">' + p.name + '</span>';
              });
              tfHtml += 
                '<div style="background:#0d0d22; border-radius:10px; padding:12px; margin:8px 0; border-left:3px solid #4a4aff;">' +
                  '<b style="color:#a0a0ff;">Timeframe ' + tf + '</b>' +
                  '<div class="signal-row"><span>RSI:</span> <span>' + (d.rsi || 'N/A') + '</span></div>' +
                  '<div style="margin-top:6px;"><b>Pola:</b> ' + (patHtml || '<span style="color:#888;">-</span>') + '</div>' +
                  '<div style="margin-top:6px;"><b>Elliott Wave:</b> ' + ((d.elliottWave || {}).wave || 'N/A') + ' (' + ((d.elliottWave || {}).confidence || 0) + '%)<br><small>' + ((d.elliottWave || {}).description || '') + '</small></div>' +
                  '<div style="margin-top:6px;"><b>SMC:</b> <span style="color:' + ((d.smc || {}).signal === 'Bullish' ? '#00ff88' : ((d.smc || {}).signal === 'Bearish' ? '#ff4444' : '#ccc')) + ';">' + ((d.smc || {}).signal || 'Neutral') + '</span><br><small>' + ((d.smc || {}).summary || '') + '</small></div>' +
                '</div>';
            });
          }
          
          var rec = data.recommendation || {};
          var recColor = (rec.action || '').includes('LONG') ? '#00ff88' : ((rec.action || '').includes('SHORT') ? '#ff4444' : '#ffaa00');
          var recBg = (rec.action || '').includes('LONG') ? '#1a2a1a' : ((rec.action || '').includes('SHORT') ? '#2a1a1a' : '#1a1a2a');
          var astro = data.astrology || {};
          
          resultDiv.innerHTML = 
            '<div class="card" style="border:2px solid #4a4aff;">' +
              '<h3>' + data.symbol + ' — ' + (data.name || '') + '</h3>' +
              '<div class="signal-row"><span><b>💵 Harga:</b></span> <strong>$' + (data.price || 0).toLocaleString() + '</strong></div>' +
              '<div class="signal-row"><span><b>📈 24h:</b></span> <span style="color:' + ((data.change24h || 0) >= 0 ? '#00ff88' : '#ff4444') + ';">' + (data.change24h || 0).toFixed(2) + '%</span></div>' +
              '<div class="signal-row"><span><b>🛡 Support:</b></span> <span style="color:#00ff88;">$' + (data.support || '—') + '</span></div>' +
              '<div class="signal-row"><span><b>🎯 Resistance:</b></span> <span style="color:#ff4444;">$' + (data.resistance || '—') + '</span></div>' +
              '<div style="margin-top:15px; padding:14px; background:' + recBg + '; border-radius:12px; text-align:center;">' +
                '<b style="font-size:1.3rem; color:' + recColor + ';">🎯 REKOMENDASI: ' + (rec.action || 'HOLD') + ' (' + (rec.confidence || 'Netral') + ')</b>' +
                '<div style="margin-top:6px;">' + (rec.summary || rec.explanation || '') + '</div>' +
              '</div>' +
              '<div style="margin-top:15px;">' + tfHtml + '</div>' +
              '<div style="margin-top:12px; padding:10px; background:#1a1a2a; border-radius:8px;">' +
                '<b>🌙 Astrologi:</b> ' + (astro.signal || 'N/A') + ' (' + (astro.moonPhase || '') + ' ' + (astro.illumination || '') + '%)<br><small>' + (astro.interpretation || '') + '</small>' +
              '</div>' +
            '</div>';
        } catch(e) {
          resultDiv.innerHTML = '<div class="error">Gagal terhubung ke server. Error: ' + e.message + '</div>';
        }
      };
    })();
  </script>
</body>
</html>
